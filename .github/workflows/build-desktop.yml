name: Build desktop apps

on:
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: bash scripts/build_macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: club-compras-macos
          path: dist/Club de Compras.app
          if-no-files-found: error

  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements-build.txt
          .\.venv\Scripts\python.exe -m pytest
          .\.venv\Scripts\pyinstaller.exe --clean --noconfirm club_compras_windows.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: club-compras-windows
          path: dist/ClubDeCompras
          if-no-files-found: error
