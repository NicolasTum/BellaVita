name: Build Windows installer

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build app and installer
        shell: pwsh
        env:
          ISCC_EXE: C:\Program Files (x86)\Inno Setup 6\ISCC.exe
        run: .\scripts\build_windows.ps1

      - name: Verify installer
        shell: pwsh
        run: |
          $Version = .\.venv\Scripts\python.exe -c "from app.version import VERSION; print(VERSION)"
          $Installer = "dist\installer\BellaVita_ClubDeCompras_Setup_$Version.exe"
          if (-not (Test-Path $Installer)) {
            throw "Installer not found: $Installer"
          }
          Write-Host "Installer ready: $Installer"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: BellaVita-ClubDeCompras-Windows-Installer
          path: dist/installer/BellaVita_ClubDeCompras_Setup_*.exe
          if-no-files-found: error
          retention-days: 14
